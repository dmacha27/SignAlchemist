services:
  backend:
    build:
      context: ./backend
    volumes:
      - ./backend:/app
    env_file:
      - .env.dev
    environment:
      PYTHON_ENABLED: ${PYTHON_ENABLED:-true}
    ports:
      - "${VITE_BACKEND_PORT:-8000}:8000"
    command: uvicorn app.main:app --host 0.0.0.0 --reload --port 8000

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "${FRONTEND_PORT:-5002}:5173"
    env_file:
      - .env.dev
    environment:
      CHOKIDAR_USEPOLLING: "true"
