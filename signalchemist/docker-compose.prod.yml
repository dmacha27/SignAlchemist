services:
  backend:
    build:
      context: ./backend
    env_file:
      - .env.prod
    environment:
      PYTHON_ENABLED: ${PYTHON_ENABLED:-false}
    expose:
      - "8000"
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
    ports:
      - "${FRONTEND_PORT:-5002}:80"
    depends_on:
      - backend
    expose:
      - "80"
    restart: unless-stopped
